# Local fleet SIMULATION — a controller + four "real-looking" agents that run
# PM2 (demo processes) and probe a shared Redis + MariaDB, so the dashboard shows
# live Redis / MySQL / PM2 data. NOT for production.
#
#   1. Create the controller login (once):   bun run setup-auth   (writes .env)
#   2. docker compose -f docker-compose.fleet.yml up --build
#   3. http://localhost:5500 → log in → Fleet → "Manage" a server → its Overview
#      shows Redis ✓, MySQL ✓, and the demo PM2 processes.
#
# systemd-based service tiles are off here (MONITORED_UNITS="") because containers
# don't run systemd; Redis/MySQL/PM2 use direct probes, so they work.

x-join-token: &join "sim-join-token-change-me"

services:
  controller:
    build: .
    command: bun run start
    env_file: .env
    environment:
      FLEET_JOIN_TOKEN: *join
      BIND_HOST: "0.0.0.0"
      PORT: "5500"
      SECURE_COOKIES: ""
      MONITORED_UNITS: ""          # controller box: no systemd service tiles
    ports:
      - "5500:5500"

  redis:
    image: redis:7-alpine

  mysql:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: "sim"
      MARIADB_DATABASE: "appdb"
      MARIADB_USER: "sm"
      MARIADB_PASSWORD: "sim"

  agent-web: &agent
    build:
      context: .
      dockerfile: Dockerfile.agent-sim
    hostname: agent-web
    environment: &agent-env
      SERVERMIND_CONTROLLER: "ws://controller:5500/fleet/agent"
      FLEET_ALLOW_INSECURE: "1"     # trusted internal docker network only — prod must use wss://
      FLEET_JOIN_TOKEN: *join
      SERVERMIND_AGENT_ID: "sim-agent-web-00000001"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_USER: "sm"
      MYSQL_PASSWORD: "sim"
      MONITORED_UNITS: ""          # no systemd in a container
    depends_on: [controller, redis, mysql]

  agent-db:
    <<: *agent
    hostname: agent-db
    environment:
      <<: *agent-env
      SERVERMIND_AGENT_ID: "sim-agent-db-00000001"

  agent-cache:
    <<: *agent
    hostname: agent-cache
    environment:
      <<: *agent-env
      SERVERMIND_AGENT_ID: "sim-agent-cache-0000001"

  agent-app:
    <<: *agent
    hostname: agent-app
    environment:
      <<: *agent-env
      SERVERMIND_AGENT_ID: "sim-agent-app-00000001"

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>ServerMind</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/geist/index.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/geist-mono/index.css" />
<link rel="stylesheet" href="/app.css" />
</head>

<body>
<div class="app">

  <!-- ─── sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
      </span>
      <div>
        <div class="brand-name">ServerMind</div>
        <div class="brand-env" id="hostName">—</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-item active" data-nav="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Overview
      </div>
      <div class="nav-item" data-nav="assistant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9.94 14.06A2 2 0 0 0 8.5 12.62L2.37 11.04a.5.5 0 0 1 0-.97L8.5 8.5a2 2 0 0 0 1.44-1.44L11.52.93a.5.5 0 0 1 .96 0l1.58 6.13A2 2 0 0 0 15.5 8.5l6.13 1.58a.5.5 0 0 1 0 .96L15.5 12.62a2 2 0 0 0-1.44 1.44l-1.58 6.13a.5.5 0 0 1-.96 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
        Assistant
      </div>
    </nav>

    <div class="side-status">
      <div class="side-status-row">
        <span class="side-status-dot" id="pulseDot"></span>
        <span class="side-status-text" id="pulseText">Checking…</span>
      </div>
      <div class="side-status-time" id="pulseTime"></div>
    </div>
  </aside>
  <div class="overlay hidden" id="overlay"></div>

  <!-- ─── main ─── -->
  <div class="main">
    <header class="topbar">
      <button class="btn hamburger" id="hamburger" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="topbar-title">
        <span class="page-title" id="pageTitle">Overview</span>
        <span class="env-badge">production</span>
      </div>
      <span class="spacer"></span>
      <div class="topbar-actions">
        <button class="arm" id="arm" aria-pressed="false" title="When OFF, ServerMind refuses all mutating actions — enforced server-side.">
          <span class="toggle-track"><span class="toggle-knob"></span></span><span class="toggle-label">Mutations Off</span>
        </button>
        <button class="btn" id="refresh" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
        <button class="btn" id="logout" title="Sign out">Logout</button>
      </div>
    </header>

    <!-- ===== OVERVIEW ===== -->
    <section data-view="overview">
      <div class="overview">
        <div class="metrics" id="kpis">
          <div class="metric-card"></div><div class="metric-card"></div><div class="metric-card"></div><div class="metric-card"></div>
        </div>

        <div class="section-title">Services</div>
        <div class="services" id="healthGrid"></div>

        <div class="section-title">PM2 Processes</div>
        <div class="panel">
          <div class="table-scroll">
            <table class="pm2-table">
              <thead>
                <tr>
                  <th>Process</th><th>Status</th><th class="r">CPU</th><th class="r">Memory</th><th class="r">Restarts</th><th class="r">Uptime</th>
                </tr>
              </thead>
              <tbody id="pm2Body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== ASSISTANT ===== -->
    <section data-view="assistant" class="hidden">
      <div class="chat-log" id="log"><div class="chat-wrap" id="wrap"></div></div>
      <div class="composer">
        <div class="composer-inner">
          <div class="hint" id="hint"></div>
          <div class="input-pill">
            <textarea id="input" rows="1" placeholder="Ask about your server…"></textarea>
            <button class="send-btn" id="send" title="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- ─── login gate ─── -->
<div class="modal hidden" id="gate">
  <div class="modal-card">
    <div class="modal-head">
      <span class="modal-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span>
      <span class="modal-title">ServerMind</span>
    </div>
    <p class="modal-sub">Sign in with your password and authenticator code.</p>
    <input id="password" class="field" type="password" placeholder="Password" autocomplete="current-password" />
    <input id="totp" class="field code" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="6-digit code" />
    <button id="connect" class="modal-btn">Sign in</button>
    <div class="modal-err" id="gateErr"></div>
  </div>
</div>

<script src="/app.js" defer></script>
</body>
</html>
